<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Halaman Utama</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .container {
            background: linear-gradient(135deg, #ff9ecf, #ff4fa3);
            padding: 80px;
            text-align: center;
            min-height: 100vh;

            
            animation: fadeIn 1s ease;
        }

        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            margin-bottom: 10px;

            
            animation: slideDown 1s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        p {
            font-size: 18px;

            
            animation: fadeInText 2s ease;
        }

        @keyframes fadeInText {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        a {
            display: inline-block;
            margin-top: 20px;
            color: white;
            background-color: #ff4fa3;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 8px;

            
            transition: all 0.3s ease;
        }

        
        a:hover {
            background-color: #e60073;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SELAMAT DATANG</h1>
    <hr width="50%">
    <p>Selamat berkunjung!</p>
    <p>Ini adalah website pertama saya.</p>

    <p>

        <a href="biodata.html">Lihat Biodata Saya</a>
    </p>
</div>

</body>
</html>
