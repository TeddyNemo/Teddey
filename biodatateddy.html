<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Biodata Saya</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #ff9ecf, #ff4fa3);
        }

        .container {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;

            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            margin-bottom: 10px;
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 20px 0;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.1);
        }

        p {
            font-size: 18px;
            margin: 8px 0;
            animation: slideUp 1s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff4fa3;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e60073;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>BIODATA SAYA</h1>
    <hr>

    <img src="WhatsApp Image 2026-04-07 at 13.44.42.jpeg" alt="Foto Saya">

    <p><b>Nama:</b> Teddy Wijaya</p>
    <p><b>Umur:</b> 21 tahun</p>
    <p><b>Alamat:</b> Kediri, Jawa Timur, Indonesia</p>
    <p><b>Hobi:</b> Bermain game, Mancing, Skaterboarding</p>

</div>
